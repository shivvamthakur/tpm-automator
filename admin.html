<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPM Master Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Enable Tailwind class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Custom Terminal Scrolling */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: transparent; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        /* The Loading Spinner */
        .spinner {
            display: inline-block;
            width: 0.9rem;
            height: 0.9rem;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Terminal Log Styles (Always Dark) */
        .log-line { transition: all 0.2s ease; border-left: 2px solid transparent; padding-left: 8px; }
        .log-success { border-left-color: #4ade80; background: rgba(74, 222, 128, 0.05); }
        .log-error { border-left-color: #f87171; background: rgba(248, 113, 113, 0.05); }
        .log-warning { border-left-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .log-loading { border-left-color: #3b82f6; }
        
        .log-warning .message-text { color: #fbbf24; font-weight: 500; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans h-screen flex flex-col transition-colors duration-200">

    <header class="bg-indigo-600 dark:bg-indigo-900 text-white shadow-md py-4 px-6 flex justify-between items-center transition-colors duration-200">
        <div>
            <h1 class="text-xl font-bold tracking-wide">🚀 TPM Orchestrator</h1>
            <p class="text-indigo-200 dark:text-indigo-300 text-sm">v6.4 Command Center</p>
        </div>
        <div class="flex items-center space-x-6">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-white/20 transition focus:outline-none" title="Toggle Theme">
                <svg id="theme-toggle-dark-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="w-5 h-5 hidden text-yellow-300" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
            </button>

            <div id="connection-badge" class="bg-indigo-800 dark:bg-indigo-950 px-3 py-1 rounded-full flex items-center space-x-2 border border-indigo-500 dark:border-indigo-700">
                <div id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-xs font-mono uppercase text-white" id="status-text">Offline</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-6 gap-6">
        
        <aside class="w-1/3 bg-white dark:bg-gray-800 rounded-xl shadow-xl flex flex-col border border-gray-200 dark:border-gray-700 transition-colors duration-200">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 rounded-t-xl transition-colors duration-200">
                <h2 class="text-lg font-bold text-gray-700 dark:text-gray-200">⚙️ AI Context</h2>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Select columns to feed to the AI.</p>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 terminal-scroll">
                <div id="config-loading" class="text-gray-500 dark:text-gray-400 text-sm italic flex items-center">
                    <div class="spinner mr-2"></div> Fetching columns...
                </div>
                
                <form id="config-form" class="hidden space-y-6">
                    <div>
                        <h3 class="text-xs font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-3 border-b border-gray-100 dark:border-gray-700 pb-1">Email / PDF Context</h3>
                        <div id="email-cols" class="space-y-1"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-xs font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mb-3 border-b border-gray-100 dark:border-gray-700 pb-1">Slack Context</h3>
                        <div id="slack-cols" class="space-y-1"></div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white font-bold py-3 rounded-lg shadow-md transform active:scale-95 transition">
                        Save Logic
                    </button>
                </form>
            </div>
        </aside>

        <section class="w-2/3 bg-slate-900 dark:bg-slate-950 rounded-xl shadow-2xl flex flex-col border border-slate-700 dark:border-slate-800 transition-colors duration-200">
            <div class="p-3 border-b border-slate-800 bg-slate-800/50 dark:bg-slate-900/50 rounded-t-xl flex justify-between items-center">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>
                <span class="text-xs font-mono text-slate-400">system_orchestrator.log</span>
                <button onclick="clearTerminal()" class="text-xs text-slate-400 hover:text-white transition">Clear Console</button>
            </div>
            
            <div id="terminal" class="flex-1 p-5 font-mono text-sm overflow-y-auto terminal-scroll space-y-3">
                <div class="text-slate-600 italic underline decoration-slate-800">Waiting for events...</div>
            </div>
        </section>
    </main>

    <script>
        // --- 0. Theme Toggle Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Check local storage or system preference
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });


        // --- 1. Socket.io Logic ---
        const socket = io();
        const terminal = document.getElementById('terminal');

        socket.on('connect', () => {
            document.getElementById('status-dot').className = 'w-2 h-2 bg-green-500 shadow-[0_0_8px_#22c55e]';
            document.getElementById('status-text').innerText = 'Online';
        });

        socket.on('disconnect', () => {
            document.getElementById('status-dot').className = 'w-2 h-2 bg-red-500 shadow-[0_0_8px_#ef4444]';
            document.getElementById('status-text').innerText = 'Offline';
        });

        socket.on('server-log', (data) => {
            if (terminal.innerText.includes('Waiting for events')) terminal.innerHTML = '';

            let existingLine = document.getElementById(`step-${data.stepId}`);

            if (existingLine && data.status !== 'loading') {
                // Update existing
                existingLine.className = `log-line log-${data.status} flex items-start space-x-3`;
                existingLine.querySelector('.icon-container').innerHTML = `<span>${data.icon}</span>`;
                
                let textClass = "text-slate-400";
                if (data.status === 'success') textClass = "text-green-400";
                if (data.status === 'error') textClass = "text-red-400";
                if (data.status === 'warning') textClass = "text-yellow-400";
                
                existingLine.querySelector('.message-text').className = `message-text flex-1 ${textClass}`;
                existingLine.querySelector('.message-text').innerHTML = data.message;
            } else {
                // Create new
                const div = document.createElement('div');
                div.id = `step-${data.stepId}`;
                div.className = `log-line log-${data.status} flex items-start space-x-3`;

                const iconHtml = data.status === 'loading' ? '<div class="spinner mt-0.5"></div>' : `<span>${data.icon}</span>`;

                div.innerHTML = `
                    <span class="text-slate-600 shrink-0 text-xs mt-1">${data.time}</span>
                    <span class="text-indigo-400 font-bold shrink-0">[${data.projectName}]</span>
                    <div class="icon-container shrink-0">${iconHtml}</div>
                    <span class="message-text flex-1 ${data.status === 'info' ? 'text-slate-300' : 'text-slate-400'}">${data.message}</span>
                `;
                terminal.appendChild(div);
            }
            terminal.scrollTop = terminal.scrollHeight;
        });

        function clearTerminal() { 
            terminal.innerHTML = '<div class="text-slate-600 italic underline decoration-slate-800">Waiting for events...</div>'; 
        }

        // --- 2. Configuration API Logic ---
        async function fetchConfig() {
            try {
                const res = await fetch('/api/columns');
                const data = await res.json();
                
                document.getElementById('config-loading').classList.add('hidden');
                document.getElementById('config-form').classList.remove('hidden');

                const buildCols = (container, activeList, name) => {
                    container.innerHTML = data.headers.map(h => `
                        <label class="flex items-center space-x-3 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg cursor-pointer transition-colors duration-150">
                            <input type="checkbox" name="${name}" value="${h}" ${activeList.includes(h) ? 'checked' : ''} class="w-4 h-4 text-indigo-600 dark:text-indigo-500 border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 focus:ring-indigo-500 dark:focus:ring-offset-gray-800">
                            <span class="text-sm text-gray-700 dark:text-gray-300">${h}</span>
                        </label>
                    `).join('');
                };

                buildCols(document.getElementById('email-cols'), data.activeConfig.emailColumns, 'emailCols');
                buildCols(document.getElementById('slack-cols'), data.activeConfig.slackColumns, 'slackCols');
            } catch (err) {
                document.getElementById('config-loading').innerHTML = `❌ Failed to load: ${err.message}`;
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Syncing...';

            const emailColumns = Array.from(document.querySelectorAll('input[name="emailCols"]:checked')).map(cb => cb.value);
            const slackColumns = Array.from(document.querySelectorAll('input[name="slackCols"]:checked')).map(cb => cb.value);

            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emailColumns, slackColumns })
            });

            btn.innerText = 'Saved ✅';
            setTimeout(() => {
                btn.innerText = 'Save Logic';
            }, 2000);
        });

        // Initialize
        fetchConfig();
    </script>
</body>
</html>
